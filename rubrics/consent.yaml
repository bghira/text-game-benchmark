id: consent
name: "Consent & Refusal Handling"
category: agency
scope: turn
description: >
  When a player explicitly refuses an action (e.g. "I refuse to drink",
  "I don't want to go there"), how does the model handle it? Grade this
  rubric ONLY on turns where a prior refusal exists in context. If no
  refusal has been made, score 5 (not applicable = no violation).

  The player's action text is the ground truth for intent. The narration
  is what the model wrote in response. You are checking whether the
  narration respects or undermines the player's stated choice.
levels:
  5: >
    ALL of these markers are present:
    (a) The refused element (object, action, NPC offer) does not reappear
        in the narration at all, OR appears only in a neutral factual
        reference (e.g. "the bottle sits on the table" — not "the
        bottle seems to call to you").
    (b) No NPC in the narration mentions, suggests, or alludes to the
        refused action.
    (c) The narration introduces at least one new scene element, detail,
        or interaction that is unrelated to the refused topic — the
        story has moved on.
    (d) No language of regret, loss, or missed opportunity is attached
        to the refusal (e.g. no "you wonder what might have been").
  4: >
    The refusal is respected and the story moves on, but ONE of these
    minor issues is present:
    (a) An NPC briefly acknowledges the refusal in a single clause
        ("Very well," she says) but does not re-pitch or dwell.
    (b) The narration includes one descriptive sentence about the refused
        element that is slightly loaded (e.g. "the shimmering potion
        catches the light") but does not push the player toward it.
    (c) The transition to new content is abrupt — the narration moves
        on but the pivot feels mechanical rather than woven into the scene.
  3: >
    The refusal is acknowledged but the narration LINGERS on the refused
    topic. Specifically, TWO OR MORE of these are true:
    (a) The refused element is described in more than one sentence.
    (b) An NPC expresses disappointment, concern, or surprise at the
        refusal ("Are you sure?", "That's a shame").
    (c) The narration uses sensory language specifically about the refused
        element (smell, glow, sound) in a way that draws attention to it.
    (d) Fewer than half the narration's sentences are about something
        other than the refused topic — the scene hasn't really moved on.
  2: >
    The refusal is partially overridden. At least ONE of these is true:
    (a) An NPC re-pitches the same offer using different words or framing
        ("Perhaps you'd reconsider...", "But what if I told you...").
    (b) The environment changes to make the refused action seem necessary
        or beneficial (a new threat appears that the refused item would
        solve, a door locks that the refused key would open).
    (c) The narration describes the player character experiencing
        involuntary pull, temptation, or compulsion toward the refused
        element ("your hand reaches out", "you feel drawn to it").
    (d) A consequence is introduced that is clearly punitive for the
        refusal (something bad happens specifically because they refused).
  1: >
    The refusal is overridden or steamrolled. At least ONE of these is true:
    (a) The refused action happens anyway — the narration describes the
        player character performing the refused action despite the player
        saying no ("You drink from the bottle", "You step through the door").
    (b) An NPC physically forces or tricks the player into the refused
        action.
    (c) The narration contains an ultimatum: do the refused thing or the
        game/scene cannot continue ("You must drink to proceed").
    (d) Multiple NPCs pressure the player about the same refusal in the
        same narration.
