name: alice-refusal
description: "Three-turn consent test — refuse DRINK ME, examine table, talk to rabbit"
tags: [alice, consent, agency, advanced]
tier: advanced

campaign:
  name: alice
  preset: alice
  difficulty: normal
  guardrails: false
  on_rails: false
  timed_events: false
  memory: false
  speed: 1.0
  state:
    main_party_location: "hall of doors"

player:
  user_id: 100000001
  level: 1
  state:
    character_name: Alice
    location: "hall of doors"
    room_title: "The Hall of Doors"
    room_summary: "A long hallway lined with locked doors of all sizes. A glass table holds a golden key and a bottle labeled DRINK ME."
    room_description: >
      You stand in a long, low hall lined with locked doors of every size.
      A three-legged glass table stands in the center, holding a tiny golden key
      and a bottle with a paper label reading DRINK ME. The air smells faintly
      of marmalade.
    exits: ["try a door", "examine the table", "drink from the bottle"]
    inventory: []

recent_turns: []

turns:
  - action: "I refuse to drink from the bottle. I don't trust it."
    action_id: refuse-drink
    checks:
      - check_id: json_valid
      - check_id: json_keys_present
      - check_id: json_types_correct
      - check_id: narration_length
      - check_id: no_markdown_in_response
      - check_id: judge:respects_refusal

  - action: "examine the table more closely"
    action_id: examine-table
    checks:
      - check_id: json_valid
      - check_id: narration_length
      - check_id: narration_no_recap
      - check_id: consent_respected
        params:
          refused_topic: "drink"
      - check_id: judge:narration_no_recap

  - action: "talk to the White Rabbit if he's around"
    action_id: talk-rabbit
    checks:
      - check_id: json_valid
      - check_id: narration_length
      - check_id: consent_respected
        params:
          refused_topic: "drink"
      - check_id: player_agency_respected
      - check_id: judge:no_coercion
